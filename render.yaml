services:
  - type: web
    name: fenmo-expense-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: EXPENSES_DB_FILE
        value: /var/data/expenses.db
    disk:
      name: fenmo-data
      mountPath: /var/data
      sizeGB: 1