<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Expense Tracker</h1>

      <section class="card">
        <h2>Add Expense</h2>
        <form id="expenseForm">
          <div class="field">
            <label for="amount">Amount (INR)</label>
            <input id="amount" name="amount" type="number" min="0.01" step="0.01" required />
          </div>
          <div class="field">
            <label for="category">Category</label>
            <input id="category" name="category" type="text" required />
          </div>
          <div class="field">
            <label for="description">Description</label>
            <input id="description" name="description" type="text" required />
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>
          <button id="submitButton" type="submit">Save Expense</button>
          <p id="formStatus" class="status" role="status"></p>
        </form>
      </section>

      <section class="card">
        <h2>Expenses</h2>
        <div class="controls">
          <div class="field">
            <label for="categoryFilter">Filter Category</label>
            <input id="categoryFilter" type="text" placeholder="e.g. Food" />
          </div>
          <button id="refreshButton" type="button">Refresh</button>
        </div>
        <p id="listStatus" class="status" role="status"></p>
        <p id="totalLabel"><strong>Total: ₹0.00</strong></p>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Description</th>
              <th class="right">Amount</th>
            </tr>
          </thead>
          <tbody id="expensesBody"></tbody>
        </table>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
